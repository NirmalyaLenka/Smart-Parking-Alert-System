; ============================================================
;  PlatformIO Project Configuration
;  Smart Parking Alert System — ESP32
; ============================================================

[env:esp32dev]
platform  = espressif32
board     = esp32dev
framework = arduino

; Serial monitor
monitor_speed = 115200

; Libraries (auto-resolved from registry)
lib_deps =
  ; BLE is built into the Arduino-ESP32 framework — no extra lib needed.
  ; If you want OTA update support, add:
  ; https://github.com/ayushsharma82/AsyncElegantOTA

; Build flags
build_flags =
  -DCORE_DEBUG_LEVEL=3   ; verbose serial output (set 0 for production)

; Upload settings (adjust port as needed)
; upload_port = COM3      ; Windows
; upload_port = /dev/ttyUSB0  ; Linux

[env:esp32_lipo]
; Use this env if running on LiPo battery (enables ULP / deep sleep tuning)
extends = env:esp32dev
build_flags =
  ${env:esp32dev.build_flags}
  -DBATTERY_MODE=1
